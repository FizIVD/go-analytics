global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "api"
    static_configs:
      - targets: ["api:2112"]   # Go app metrics (Prometheus client)

  - job_name: "clickhouse"
    static_configs:
      - targets: ["clickhouse-exporter:9116"]

  - job_name: "kafka"
    static_configs:
      - targets: ["kafka:7071"] # если подключишь Kafka JMX Exporter
