version: "3.9"

services:
  api:
    build:
      context: .
      target: api-runtime
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment: 
      - KAFKA_HOST=kafka:9092 
      - KAFKA_TOPIC=user-events 
      - PORT=8080
    networks:
      - app-network

  generator:
    build:
      context: .
      target: generator-runtime
    depends_on:
      api:
        condition: service_healthy
    environment:
      - API_URL=http://api:8080/event
    command: ["generator", "-u", "1000", "-d", "1"]
    networks:
      - app-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - app-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--list", "--bootstrap-server", "kafka:9092"]
      interval: 5s
      retries: 12
      timeout: 5s
    networks:
      - app-network
  
  kafka-init:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - kafka
    entrypoint: >
      sh -c "
      while ! kafka-topics --bootstrap-server kafka:9092 --list > /dev/null 2>&1; do sleep 1; done;
      kafka-topics --bootstrap-server kafka:9092 --create --topic user-events --partitions 12 --replication-factor 1 || echo 'exists';
      "
    networks:
      - app-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - app-network

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    user: "101:101"
    environment:
      CLICKHOUSE_DB: events
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    ports:
      - "8123:8123"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse:Z
      - ./init_kafka.sql:/docker-entrypoint-initdb.d/init_kafka.sql
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - app-network

  clickhouse-exporter:
    image: f1yegor/clickhouse-exporter:latest
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    ports:
      - "9116:9116"
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:

volumes:
  grafana_data:
  ch_data:
  clickhouse_data:
